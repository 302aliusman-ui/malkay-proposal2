<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Madam Malkay Husna ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff4b6e,#ff758c,#ff9a9e);
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

h1{
font-size:2.5em;
margin-bottom:10px;
}

#message{
font-size:20px;
max-width:600px;
padding:20px;
line-height:1.6;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
font-size:16px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#countdown{
margin-top:10px;
font-size:18px;
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 5s linear infinite;
opacity:0.8;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}

}

</style>
</head>

<body>

<h1>For Madam Malkay Husna ❤️</h1>

<div id="message">
A special message will appear here for Madam Malkay Husna...
</div>

<button onclick="askNotification()">Allow Notifications 🔔</button>
<button onclick="generateMessage()">Send Extra Message 💌</button>

<div id="countdown"></div>

<script>

const messages=[

"Madam Malkay Husna, every day I realize that some people enter our life quietly but slowly become the most beautiful part of it. Your presence makes the world feel softer and kinder.",

"Dear Madam Malkay Husna, sometimes the heart chooses someone without asking permission. Maybe that's why thoughts of you appear like gentle light in my day.",

"Madam Malkay Husna, if kindness had a face it would probably look like you. You bring calmness to moments without even trying.",

"Dear Madam Malkay Husna, some feelings are not loud but they stay constant, like a quiet star shining in the sky every night.",

"Madam Malkay Husna, the world becomes a little more beautiful when someone like you exists in it."

];

function randomMessage(){

return messages[Math.floor(Math.random()*messages.length)];

}

function generateMessage(){

const msg=randomMessage();

document.getElementById("message").innerText=msg;

sendNotification(msg);

}

function askNotification(){

if("Notification" in window){

Notification.requestPermission().then(permission=>{

if(permission==="granted"){
alert("Notifications enabled for Madam Malkay Husna ❤️");
}else{
alert("Please allow notifications to receive messages 💌");
}

});

}

}

function sendNotification(text){

if(Notification.permission==="granted"){

new Notification("💌 Message for Madam Malkay Husna",{
body:text
});

}

}

/* countdown */

function updateCountdown(){

const now=new Date();

const target1=new Date();
target1.setHours(1,43,0,0);

const target2=new Date();
target2.setHours(13,43,0,0);

let target;

if(now<target1){
target=target1;
}
else if(now<target2){
target=target2;
}
else{
target=new Date();
target.setDate(target.getDate()+1);
target.setHours(1,43,0,0);
}

const diff=target-now;

const h=Math.floor(diff/1000/60/60);
const m=Math.floor(diff/1000/60)%60;
const s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
"Next message in "+h+"h "+m+"m "+s+"s";

}

setInterval(updateCountdown,1000);

/* auto message time */

function checkTime(){

const now=new Date();

if(now.getHours()===1 && now.getMinutes()===43){
generateMessage();
}

if(now.getHours()===13 && now.getMinutes()===43){
generateMessage();
}

}

setInterval(checkTime,30000);

/* hearts everywhere */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerText="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,200);

</script>

</body>
</html>
